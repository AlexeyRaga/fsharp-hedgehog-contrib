name: master

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      CONFIGURATION: Release

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Install dependencies
      run: |
        dotnet restore
        dotnet tool restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build

    - name: Generate DocFX metadata
      run: |
        dotnet fsi gen-docfx.fsx Release
        dotnet docfx build docs/docfx.json

    - name: Pack
      run: dotnet pack --no-restore --no-build -o ./packages

    - name: Publish packages
      if: github.ref == 'refs/heads/main'
      run: dotnet nuget push ${{ github.workspace }}/packages/**/*.nupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Determine release tag
      if: github.ref == 'refs/heads/main'
      id: release_tag
      run: |
        NUPKG=$(basename "$(ls ./packages/*.nupkg | head -1)" .nupkg)
        VERSION=$(echo "$NUPKG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+$')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Create release
      if: github.ref == 'refs/heads/main' && steps.release_tag.outputs.exists == 'false'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.release_tag.outputs.version }}
        name: v${{ steps.release_tag.outputs.version }}
        files: ./packages/*.nupkg
        generate_release_notes: true

    - name: Deploy to GitHub Pages
      if: (github.ref == 'refs/heads/main')
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./_site
